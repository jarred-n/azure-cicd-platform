# .github/workflows/deploy-production.yml
name: CD — Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production   
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Production
        run: |
          # 使用 semver tag 作为镜像版本，保证可追溯
          az containerapp update \
            --name app-production \
            --resource-group rg-cicd-demo \
            --image ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            --set-env-vars \
              NEXT_PUBLIC_ENV=production \
              NEXT_PUBLIC_VERSION=${{ github.ref_name }}

      - name: Get production URL
        id: get-url
        run: |
          URL=$(az containerapp show \
            --name app-production \
            --resource-group rg-cicd-demo \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$URL" >> $GITHUB_OUTPUT

      - name: Production smoke test
        run: |
          sleep 20
          curl --fail --retry 5 --retry-delay 10 \
            "https://$(az containerapp show \
              --name app-production \
              --resource-group rg-cicd-demo \
              --query properties.configuration.ingress.fqdn -o tsv)/api/health"