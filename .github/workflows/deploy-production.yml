# .github/workflows/deploy-production.yml
name: CD — Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  promote-image:
    name: Promote Staging Image to Release
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag existing SHA image with release version
        run: |
          # tag 指向的 commit，就是当初 staging 部署时构建镜像用的 commit
          SHA_IMAGE="ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
          RELEASE_IMAGE="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"

          # buildx imagetools 直接在 registry 端复制 tag，不拉取、不重建
          docker buildx imagetools create --tag "$RELEASE_IMAGE" "$SHA_IMAGE"
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: promote-image
    environment:
      name: production
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Azure login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Production
        run: |
          # 使用 semver tag 作为镜像版本，保证可追溯
          az containerapp update \
            --name app-production \
            --resource-group rg-cicd-demo \
            --image ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            --set-env-vars \
              NEXT_PUBLIC_ENV=production \
              NEXT_PUBLIC_VERSION=${{ github.ref_name }}

      - name: Get production URL
        id: get-url
        run: |
          URL=$(az containerapp show \
            --name app-production \
            --resource-group rg-cicd-demo \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$URL" >> $GITHUB_OUTPUT

      - name: Production smoke test
        run: |
          sleep 20
          curl --fail --retry 5 --retry-delay 10 \
            "https://$(az containerapp show \
              --name app-production \
              --resource-group rg-cicd-demo \
              --query properties.configuration.ingress.fqdn -o tsv)/api/health"
