name: CD — Deploy to Staging

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write  

jobs:
  build-and-push:
    name: Build & Push Image
    uses: ./.github/workflows/reusable-docker.yml
    with:
      push: true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name app-staging \
            --resource-group rg-cicd-demo \
            --image ghcr.io/${{ github.repository }}:sha-${{ github.sha }} \
            --set-env-vars \
              NEXT_PUBLIC_ENV=staging \
              NEXT_PUBLIC_VERSION=${{ github.sha }}

      - name: Get staging URL
        id: get-url
        run: |
          URL=$(az containerapp show \
            --name app-staging \
            --resource-group rg-cicd-demo \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$URL" >> $GITHUB_OUTPUT

      - name: Smoke test
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 20
          curl --fail --retry 3 --retry-delay 10 \
            "https://$(az containerapp show \
              --name app-staging \
              --resource-group rg-cicd-demo \
              --query properties.configuration.ingress.fqdn -o tsv)/api/health"

      - name: Rollback on smoke test failure
        if: failure()
        run: |
          echo "Smoke test failed — rolling back staging"
          PREV_IMAGE=$(az containerapp revision list \
            --name app-staging \
            --resource-group rg-cicd-demo \
            --query "[1].properties.template.containers[0].image" -o tsv)
          az containerapp update \
            --name app-staging \
            --resource-group rg-cicd-demo \
            --image "$PREV_IMAGE"