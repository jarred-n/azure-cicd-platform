name: Reusable — Docker Build & Push

on:
  workflow_call:
    inputs:
      push:
        type: boolean
        default: false
      image-tag:
        type: string
        default: "latest"
    outputs:
      image-uri:
        description: "Full image URI with tag"
        value: ${{ jobs.docker.outputs.image-uri }}

jobs:
  docker:
    name: Docker Build ${{ inputs.push && '& Push' || 'Only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-uri: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build ${{ inputs.push && 'and push' || 'only' }}
        uses: docker/build-push-action@v6
        with:
          context: ./
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max 